<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes e Cores</title>
    <style type="text/css">
        .fonteSerif{
            font-family: "Times New Roman", Arial, Helvetica, sans-serif;
            font-size: 5em;
            font-style: italic;
        }
        .fonteSans-Serif{
            font-family: "Verdana", Arial, Helvetica, sans-serif;
            font-size: 2.5em;
            font-style: normal;
        }
        .fonteMonospace{
            font-family: "Courier New" Arial, Helvetica, sans-serif;
            font-size: 1.25em;
            font-style: oblique;
        }
        .conteudo{
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="conteudo">
    <p class="fonteSerif">Programação Web</p>
    <p class="fonteSans-Serif">Programação Web</p>
    <p class="fonteMonospace">Programação Web</p>
    </div>
</body>
</html>
