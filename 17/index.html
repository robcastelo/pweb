<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Grid</title>
    

    <link rel="stylesheet" href="bootstrap.min.css">

    <style>

        .row {
            margin-bottom: 10px;
        }
        img {
            width: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    
    <div class="container mt-4">
        <div class="row">
            
            <div class="col-sm-6 mb-3">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfruHGCnCh8VqahuXUmHUOm3UrLsyBgQ5Og1f0wd-NqQ&s=10" style="height: 100%;">
            </div>
            
            
            <div class="col-sm-6">
                
                
                <div class="row">
                    <div class="col-sm-12 mb-3">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcFymXuaqgJQ2JInmC_AmtR8h9VJxOO50LWaLoAk8cZA&s=10" style="height: 180px;">
                    </div>
                </div>
                
    
                <div class="row">
                    <div class="col-sm-6 mb-3">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSDHnlrvtd7TGVQjVDAV7wAwjQVaUhB20bir5fxavoLA&s=10" style="height: 130px;">
                    </div>
                    <div class="col-sm-6 mb-3">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkHS8DvGLAiiKwql5SeP1STPwxS7QLuFxH90uxkKKj0Q&s=10" style="height: 130px;">
                    </div>
                </div>

            
                <div class="row">
                    <div class="col-sm-4 mb-3">
                        <img src="https://chemitec.com.br/wp-content/uploads/2025/04/gatos-mais-populares.jpg" class="img-fluid"style="height: 110px;">
                    </div>
                    <div class="col-sm-4 mb-3">
                        <img src="https://selecoes.ig.com.br/media/uploads/2023/11/racas-de-gato-mais-populares-do-brasil.jpg" style="height: 110px;">
                    </div>
                    <div class="col-sm-4 mb-3">
                        <img src="https://www.petlove.com.br/images/breeds/226894/profile/original/tifanny-perfil.jpg?1596753900" style="height: 110px;">
                    </div>
                </div>

            </div>

        </div>
    </div>

    <script src="bootstrap.bundle.min.js"></script>
</body>
</html>
