<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition e Animation</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #eef4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            width: 100px;
            height: 100px;
            background: red;
            animation: girar_cor 40s linear infinite;
        }

        @keyframes girar_cor {
            0% {
                transform: rotate(0deg);
                background: red;
            }
            25% {
                transform: rotate(90deg);
                background: blue;
            }
            50% {
                transform: rotate(180deg);
                background: green;
            }
            75% {
                transform: rotate(270deg);
                background: orange;
            }
            100% {
                transform: rotate(360deg);
                background: red;
            }
        }
    </style>
</head>
<body>

    <div class="box"></div>

</body>
</html>
