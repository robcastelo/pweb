<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários e Tabelas</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-sm-8">
                <h1>Cadastre-se</h1>

                <form>
                    <div class="form-group mb-3">
                        <label for="nome">Nome:</label>
                        <input type="text" placeholder="Digite seu nome" class="form-control" id="nome">
                    </div>

                    <div class="form-group mb-3">
                        <label for="email">Email:</label>
                        <input type="email" class="form-control" id="email">
                    </div>

                    <div class="form-group mb-3">
                        <label for="senha">Senha:</label>
                        <input type="password" class="form-control" id="senha">
                    </div>

                    <div class="checkbox mb-3">
                        <label>
                            <input type="checkbox"> Aceito os termos do serviço.
                        </label>
                    </div>

                    <div class="radio mb-4">
                        <label class="me-3">
                            <input type="radio" name="opcoes"> PHP
                        </label>

                        <label>
                            <input type="radio" name="opcoes"> Java
                        </label>
                    </div>
                    

                    <button type="submit" class="btn btn-light border text-dark">Cadastrar</button>
                </form>
            </div>

            <div class="col-sm-4">
                <h3>Logar</h3>
                
                <form>
                    <div class="form-group mb-3">
                        <input type="email" class="form-control" id="login-email" placeholder="Digite seu e-mail">
                    </div>
                    
                    <div class="form-group mb-3">
                        <input type="password" class="form-control" id="login-senha" placeholder="Digite sua senha">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Logar</button>
                </form>
            </div>

        </div>

        <div class="row mt-5">
            <div class="col-sm-12">
            
                <table class="table table-striped table-hover table-condensed table-sm">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Fabricante</th>
                            <th>Preço</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Notebook 980</td>
                            <td>HP</td>
                            <td>R$ 1.800,00</td>
                        </tr>
                        <tr>
                            <td>MacBook Air</td>
                            <td>Apple</td>
                            <td>R$ 4.800,00</td>
                        </tr>
                        <tr>
                            <td>HP Pavillon</td>
                            <td>HP</td>
                            <td>R$ 2.800,00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
