<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Gradiente Radial</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
